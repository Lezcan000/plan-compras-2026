<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan de Compras 2026 - Gestión Colaborativa</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --surface: #ffffff;
            --background: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #cbd5e1;
            --locked-bg: #f8fafc;
            --editable-bg: #eff6ff;
            --success: #16a34a;
            --warning: #f59e0b;
            --danger: #dc2626;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            background: var(--surface);
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 92vh;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            z-index: 30;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-warning { background-color: var(--warning); color: white; }
        .btn-danger { background-color: var(--danger); color: white; padding: 5px 8px; font-size: 11px; }
        .btn-outline { background-color: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: #f1f5f9; }
        
        input[type="file"] { display: none; }

        .user-simulator {
            background: #f8fafc;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        select {
            padding: 6px;
            border-radius: 4px;
            border: 1px solid var(--border);
            outline: none;
        }

        .table-wrapper {
            overflow: auto;
            flex-grow: 1;
        }

        table {
            border-collapse: collapse;
            text-align: left;
            white-space: nowrap;
            width: 100%;
        }

        th {
            background-color: #e2e8f0;
            padding: 12px 16px;
            font-size: 11px;
            text-transform: uppercase;
            color: #475569;
            border-bottom: 2px solid var(--border);
            border-right: 1px solid var(--border);
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Columna fija para Acciones y primera columna */
        th:nth-child(1), td:nth-child(1) { position: sticky; left: 0; z-index: 22; background: #f8fafc; border-right: 2px solid var(--border); }
        th:nth-child(1) { z-index: 32; background: #cbd5e1; }
        
        td {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            font-size: 13px;
        }

        .row-locked { background-color: var(--locked-bg); color: var(--text-muted); }
        .row-editable { background-color: var(--editable-bg); }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            background: #e2e8f0;
        }
        .status-saving { background: #fef08a; color: #b45309; }
        .status-saved { background: #dcfce7; color: #166534; }
        .status-error { background: #fee2e2; color: #991b1b; }

        .cell-input {
            width: 100%; border: 1px solid transparent; background: transparent;
            font-size: 13px; outline: none; padding: 4px; border-radius: 4px;
        }
        .cell-input:focus { background: white; border: 1px solid var(--primary); }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal { background: white; padding: 25px; border-radius: 8px; width: 400px; text-align: center; }
        .view-hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="viewPlanCompras" class="container">
        <div class="header">
            <div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <h2 style="margin: 0; font-size: 1.2rem;">Plan de Compras 2026</h2>
                    <span id="saveStatus1" class="status-badge">☁️ Sincronizado</span>
                </div>
                <div id="summaryBar" style="margin-top: 5px; font-size: 12px; color: var(--text-muted);">Cargando...</div>
            </div>
            
            <div class="controls">
                <button class="btn btn-outline" onclick="switchView('Anexo')">📄 Ver Anexo</button>
                <button id="btnCrearPlan" class="btn btn-warning" onclick="crearFila('Plan')" style="display:none;">➕ Nueva Fila</button>
                <label class="btn btn-primary">📂 Importar <input type="file" id="fileInputPlan" accept=".xlsx"></label>
                <button class="btn btn-success" onclick="exportData('Plan')">💾 Exportar</button>
                
                <div class="user-simulator">
                    <select id="roleSelector">
                        <option value="Invitado">Solo Lectura</option>
                        <option value="Equipo de Contratación">Equipo Contratación</option>
                        <option value="Subsecretaría de Formación y Participación Ciudadana">Subsec. Formación</option>
                        <option value="Subsecretaría de Organización Social">Subsec. Organización</option>
                        <option value="Subsecretaria de Planeación Local y PP">Subsec. Planeación</option>
                        <option value="Unidad Administrativa">Unidad Administrativa</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="table-wrapper">
            <table id="dataTablePlan">
                <thead id="headPlan"></thead>
                <tbody id="bodyPlan"></tbody>
            </table>
        </div>
    </div>

    <div id="viewAnexoPresupuestal" class="container view-hidden">
        <div class="header">
            <div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <h2 style="margin: 0; font-size: 1.2rem;">Anexo Presupuestal</h2>
                    <span id="saveStatus2" class="status-badge">☁️ Sincronizado</span>
                </div>
                <div id="summaryBarAnexo" style="margin-top: 5px; font-size: 12px; color: var(--text-muted);">Cargando...</div>
            </div>
            
            <div class="controls">
                <button class="btn btn-outline" onclick="switchView('Plan')">⬅️ Volver</button>
                <select id="selProyCargaAnexo" style="font-size: 12px;">
                    <option value="240182">Proy. 240182</option>
                    <option value="240183">Proy. 240183</option>
                    <option value="240184">Proy. 240184</option>
                    </select>
                <button id="btnCrearAnexo" class="btn btn-warning" onclick="crearFila('Anexo')" style="display:none;">➕ Fila</button>
                <label class="btn btn-primary">📂 Cargar <input type="file" id="fileInputAnexo" accept=".xlsx"></label>
                <button class="btn btn-success" onclick="exportData('Anexo')">💾 Exportar</button>
            </div>
        </div>
        <div class="table-wrapper">
            <table id="dataTableAnexo">
                <thead id="headAnexo"></thead>
                <tbody id="bodyAnexo"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="passwordModal">
        <div class="modal">
            <h3>Acceso Restringido</h3>
            <p id="modalRoleName" style="font-size:14px; color:gray;"></p>
            <input type="password" id="passwordInput" style="width:80%; padding:10px; margin-bottom:10px;" placeholder="Contraseña">
            <div id="errorMsg" style="color:red; font-size:12px; display:none;">Contraseña incorrecta</div>
            <div style="display:flex; justify-content:center; gap:10px; margin-top:15px;">
                <button class="btn btn-outline" onclick="cancelRole()">Cancelar</button>
                <button class="btn btn-primary" onclick="verifyPassword()">Ingresar</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyhcnY08HJKruT5flqsgFrNsfB29IxLf5Rt2i8-78tvhJxoUykTy6RzdM1KH0bej7w/exec";
        
        let appData = [];
        let anexoData = [];
        let currentRole = "Invitado";
        let currentView = "Plan";
        let saveTimeout;

        const headersPlan = ["Subsecretaría", "Tipo de Bien", "Necesidad", "Estudio Previo", "Objeto", "Modalidad", "Causal", "Mes de Compra", "Duración del Proyecto", "Unidad de Tiempo", "Fecha Inicio Ejecución", "Valor Unitario", "Proyecto", "Tipo de Recurso", "Posición Presupuestaría", "Fondo", "Observación", "Indicador Plan de Dllo (Solo producto)", "Codigo Actividad  MGA", "Actividad detallada", "Codigo producto MGA", "Codigo CPC", "ESTADO", "CDP", "Contrato Marco", "RP", "Contratista", "Técnico", "Juridico", "Logístico", "Supervisor Principal", "Supervisor Suplente", "Apoyo a la Supervisión Técnico", "Apoyo a la Supervisión Financiero", "Apoyo a la Supervisión Juridico", "Trasladar"];
        const headersAnexo = ["Subsecretaría", "Proyecto", "CÓDIGO PRODUCTO MGA", "PRODUCTO MGA", "ACTIVIDAD MGA", "ACTIVIDADES DETALLADAS", "UNIDAD DE MEDIDA", "CANTIDAD", "COSTO UNITARIO", "COSTO TOTAL", "Clasificador por objeto de gasto (POSPRE)", "VALIDADOR ¿REQUIERE CPC?", "VALIDADOR ¿REQUIERE CPC?_1", "Clasificador CPC", "Validador sección CPC"];

        // LÓGICA DE ROLES
        const rolePasswords = {
            "Equipo de Contratación": "admin123", 
            "Subsecretaría de Formación y Participación Ciudadana": "formacion2025",
            "Subsecretaría de Organización Social": "social2025",
            "Subsecretaria de Planeación Local y PP": "planeacion2025",
            "Unidad Administrativa": "unidad2025"
        };

        document.getElementById('roleSelector').addEventListener('change', function(e) {
            if (e.target.value === "Invitado") { currentRole = "Invitado"; renderAll(); return; }
            document.getElementById('modalRoleName').innerText = e.target.value;
            document.getElementById('passwordModal').style.display = 'flex';
        });

        function verifyPassword() {
            const role = document.getElementById('modalRoleName').innerText;
            const pass = document.getElementById('passwordInput').value;
            if (pass === rolePasswords[role]) {
                currentRole = role;
                document.getElementById('passwordModal').style.display = 'none';
                document.getElementById('passwordInput').value = '';
                renderAll();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function cancelRole() {
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('roleSelector').value = currentRole;
        }

        function checkPermissions(rowOwner) {
            if (currentRole === "Equipo de Contratación") return true;
            if (currentRole === "Invitado") return false;
            const ownerNorm = (rowOwner || "").toUpperCase();
            const roleNorm = currentRole.toUpperCase();
            if (roleNorm.includes("FORMACION") && ownerNorm.includes("FORMAC")) return true;
            if (roleNorm.includes("ORGANIZACION") && ownerNorm.includes("ORGANIZACION")) return true;
            if (roleNorm.includes("PLANEACION") && ownerNorm.includes("PLANEACION")) return true;
            if (roleNorm.includes("UNIDAD") && ownerNorm.includes("UNIDAD")) return true;
            return false;
        }

        // GUARDADO AUTOMÁTICO
        function triggerAutoSave() {
            if (currentRole === "Invitado") return;
            setStatus('saving');
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({ planData: appData, anexoData: anexoData })
                    });
                    const result = await res.json();
                    setStatus(result.status === 'success' ? 'saved' : 'error');
                } catch (e) { setStatus('error'); }
            }, 2000);
        }

        function setStatus(s) {
            const b1 = document.getElementById('saveStatus1');
            const b2 = document.getElementById('saveStatus2');
            const map = {
                saving: { text: "⏳ Guardando...", class: "status-badge status-saving" },
                saved: { text: "✅ Sincronizado", class: "status-badge status-saved" },
                error: { text: "❌ Error de Red", class: "status-badge status-error" }
            };
            [b1, b2].forEach(b => { if(b){ b.innerText = map[s].text; b.className = map[s].class; }});
        }

        // RENDERIZADO DE TABLAS
        function renderAll() {
            renderTable('Plan', appData, headersPlan, 'headPlan', 'bodyPlan');
            renderTable('Anexo', anexoData, headersAnexo, 'headAnexo', 'bodyAnexo');
            document.getElementById('btnCrearPlan').style.display = currentRole !== "Invitado" ? "flex" : "none";
            document.getElementById('btnCrearAnexo').style.display = currentRole !== "Invitado" ? "flex" : "none";
        }

        function renderTable(type, data, headers, headId, bodyId) {
            const head = document.getElementById(headId);
            const body = document.getElementById(bodyId);
            
            // Header con columna de acción
            head.innerHTML = `<tr><th>Acción</th>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
            body.innerHTML = '';

            data.forEach((row, idx) => {
                const canEdit = checkPermissions(row["Subsecretaría"]);
                const tr = document.createElement('tr');
                tr.className = canEdit ? 'row-editable' : 'row-locked';
                
                // Botón eliminar si tiene permiso
                let actionCell = `<td></td>`;
                if (canEdit) {
                    actionCell = `<td><button class="btn btn-danger" onclick="eliminarFila('${type}', ${idx})">🗑️</button></td>`;
                }

                let cells = actionCell;
                headers.forEach(h => {
                    const val = row[h] || "";
                    if (canEdit && h !== "Subsecretaría") {
                        cells += `<td><input class="cell-input" value="${val}" onblur="updateVal('${type}', ${idx}, '${h}', this.value)"></td>`;
                    } else {
                        cells += `<td>${val}</td>`;
                    }
                });
                tr.innerHTML = cells;
                body.appendChild(tr);
            });
        }

        function updateVal(type, idx, col, val) {
            const target = type === 'Plan' ? appData : anexoData;
            if (target[idx][col] != val) {
                target[idx][col] = val;
                triggerAutoSave();
            }
        }

        function eliminarFila(type, idx) {
            if (!confirm("¿Estás seguro de que deseas eliminar esta fila? Esta acción no se puede deshacer.")) return;
            if (type === 'Plan') appData.splice(idx, 1);
            else anexoData.splice(idx, 1);
            renderAll();
            triggerAutoSave();
        }

        function crearFila(type) {
            const newRow = { "Subsecretaría": currentRole.includes("Contratación") ? "UNIDAD ADMINISTRATIVA" : currentRole };
            if (type === 'Plan') appData.push(newRow);
            else anexoData.push(newRow);
            renderAll();
            triggerAutoSave();
        }

        function switchView(v) {
            currentView = v;
            document.getElementById('viewPlanCompras').classList.toggle('view-hidden', v !== 'Plan');
            document.getElementById('viewAnexoPresupuestal').classList.toggle('view-hidden', v !== 'Anexo');
        }

        function exportData(type) {
            const data = type === 'Plan' ? appData : anexoData;
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Datos");
            XLSX.writeFile(wb, `${type}_Export.xlsx`);
        }

        // Inicialización
        renderAll();
    </script>
</body>
</html>
